<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>長野県 FIT認定設備マップ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="map"></div>

<div id="panel">
  <h1>長野県 FIT認定設備マップ</h1>
  <p class="source">出典: <a href="https://www.fit-portal.go.jp/publicinfo" target="_blank" rel="noopener">FIT情報公表用ウェブサイト（資源エネルギー庁）</a></p>
  <p id="meta" class="meta">読み込み中...</p>

  <div class="legend">
    <div class="legend-title">発電設備区分</div>
    <label class="legend-item"><input type="checkbox" data-category="太陽光" checked><span class="dot" style="background:#eda100"></span>太陽光</label>
    <label class="legend-item"><input type="checkbox" data-category="風力" checked><span class="dot" style="background:#ffffff"></span>風力</label>
    <label class="legend-item"><input type="checkbox" data-category="水力" checked><span class="dot" style="background:#4fc3f7"></span>水力</label>
    <label class="legend-item"><input type="checkbox" data-category="水力（既設導水路活用型リプレース）" checked><span class="dot" style="background:#4fc3f7"></span>水力（リプレース）</label>
    <label class="legend-item"><input type="checkbox" data-category="バイオマス" checked><span class="dot" style="background:#008300"></span>バイオマス</label>
  </div>

  <div class="legend size-legend">
    <div class="legend-title">認定出力（円の大きさ）</div>
    <div class="size-row"><span class="size-dot" style="width:8px;height:8px"></span>10kW</div>
    <div class="size-row"><span class="size-dot" style="width:16px;height:16px"></span>100kW</div>
    <div class="size-row"><span class="size-dot" style="width:30px;height:30px"></span>1,000kW</div>
    <div class="size-row"><span class="size-dot" style="width:46px;height:46px"></span>2,000kW以上</div>
  </div>

  <div class="legend">
    <div class="legend-title">卒FIT状況（調達期間終了）</div>
    <select id="fit-status-filter">
      <option value="all">すべて表示</option>
      <option value="expired">卒FIT済みのみ</option>
      <option value="within1y">1年以内に卒FIT（済み含む）</option>
      <option value="within3y">3年以内に卒FIT（済み含む）</option>
      <option value="within5y">5年以内に卒FIT（済み含む）</option>
    </select>
    <div id="fit-status-count" class="meta"></div>
  </div>

  <div class="legend">
    <div class="legend-title">位置精度</div>
    <div class="legend-item"><span class="dot precise-dot" style="background:#898781"></span>実線: 地番まで一致</div>
    <div class="legend-item"><span class="dot approx-dot" style="background:#898781"></span>破線: 大字・字レベルの概算</div>
    <div id="precision-stat" class="meta"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="app.js"></script>
</body>
</html>
